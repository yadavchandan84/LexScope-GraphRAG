services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./pdfs:/app/pdfs
      - ./ingestion:/app/ingestion
      - ./qdrant_data:/app/qdrant_data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5500:5500"
    restart: unless-stopped
    depends_on:
      - backend
